name: Ogu

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ogu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate
        run: node tools/ogu/cli.mjs validate

      - name: Doctor
        run: node tools/ogu/cli.mjs doctor
