<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kadima OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #101010;
        --bg-card: #161616;
        --bg-card-hover: #1c1c1c;
        --bg-input: #141414;
        --border: rgba(255,255,255,0.08);
        --border-hover: rgba(255,255,255,0.14);
        --text: #f2f2f2;
        --text-secondary: #b3b3b3;
        --text-muted: #7a7a7a;
        --accent: #d4d4d4;
        --accent-hover: #e4e4e4;
        --accent-soft: rgba(212,212,212,0.12);
        --success: #3fa36b;
        --error: #d05a5a;
        --warning: #c89b3c;
        --gradient: linear-gradient(135deg, #101010 0%, #161616 50%, #101010 100%);
        --font: 'Google Sans', 'Google Sans Text', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
      }
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; width: 100%; overflow: hidden; }
      body {
        background: var(--gradient);
        color: var(--text);
        font-family: 'Google Sans', 'Google Sans Text', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        transition: background 0.4s ease, color 0.3s ease;
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
      /* Remove focus outlines from terminal input */
      input:focus, input:focus-visible { outline: none !important; box-shadow: none !important; border-color: transparent !important; }
      /* Range slider thumb */
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 18px; height: 18px; border-radius: 50%;
        background: var(--accent); border: 2px solid var(--text);
        cursor: grab; box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      }
      input[type="range"]::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.15); }
      input[type="range"]::-moz-range-thumb {
        width: 18px; height: 18px; border-radius: 50%;
        background: var(--accent); border: 2px solid var(--text);
        cursor: grab; box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      }
      /* Quote button appears on hover */
      .chat-line:hover .quote-btn { opacity: 1 !important; }
      .chat-line:hover .quote-btn:hover { color: var(--accent) !important; background: var(--bg-card-hover); }

      /* ── Utility animations ── */
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes ping {
        75%, 100% { transform: scale(1.6); opacity: 0; }
      }

      /* ── Thinking indicator ── */
      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes dotPulse {
        0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
        40% { opacity: 1; transform: scale(1); }
      }
      .thinking-shimmer {
        background: linear-gradient(
          90deg,
          var(--text-muted) 0%,
          var(--text-muted) 30%,
          var(--accent) 50%,
          var(--text-muted) 70%,
          var(--text-muted) 100%
        );
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmer 2s ease-in-out infinite;
      }
      .thinking-dots span {
        display: inline-block;
        animation: dotPulse 1.4s ease-in-out infinite;
      }
      .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
      .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

      /* ── Pulsing bolt icon ── */
      @keyframes boltPulse {
        0%, 100% { opacity: 0.4; transform: scale(0.9); }
        50% { opacity: 1; transform: scale(1.15); }
      }
      .thinking-pulse {
        animation: boltPulse 1.5s ease-in-out infinite;
      }

      /* ── Letter shimmer (spotlight sweep across text) ── */
      @keyframes letterSweep {
        0% { background-position: 100% center; }
        100% { background-position: -100% center; }
      }
      .letter-shimmer {
        background: linear-gradient(90deg,
          var(--text-muted) 0%, var(--text-muted) 35%,
          var(--text) 50%,
          var(--text-muted) 65%, var(--text-muted) 100%
        );
        background-size: 600% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: letterSweep 2s linear infinite;
      }

      /* ── Infinite Canvas: Node appearance ── */
      @keyframes nodeAppear {
        from { opacity: 0; transform: scale(0.3); }
        to { opacity: 1; transform: scale(1); }
      }

      /* ── Infinite Canvas: Edge draw-in ── */
      @keyframes edgeDraw {
        from { stroke-dashoffset: 100; opacity: 0; }
        to { stroke-dashoffset: 0; opacity: 1; }
      }

      /* ── Infinite Canvas: CTO pulsing ring ── */
      @keyframes pulseRing {
        0%, 100% { r: 36; opacity: 0.4; }
        50% { r: 46; opacity: 0; }
      }

      /* ── Infinite Canvas: Flowing dash on active edges ── */
      @keyframes flowDash {
        from { stroke-dashoffset: 20; }
        to { stroke-dashoffset: 0; }
      }

      /* ── Vercel-style beam shooting from CTO to agent ── */
      @keyframes beamShoot {
        0% { stroke-dashoffset: 460; opacity: 0; }
        10% { opacity: 1; }
        80% { opacity: 1; }
        100% { stroke-dashoffset: -60; opacity: 0; }
      }

      /* ── Dot pop: scale 0 → 110% → 100% ── */
      @keyframes dotPop {
        0% { transform: scale(0); opacity: 0; }
        60% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }

      /* ── Looping glow for in-progress beams ── */
      @keyframes beamGlowLoop {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.8; }
      }

      /* ── Task node hover effect ── */
      .task-node { cursor: default; transition: transform 0.2s ease, filter 0.2s ease; }
      .task-node:hover { transform: scale(1.06); filter: drop-shadow(0 0 10px var(--node-glow, rgba(255,255,255,0.12))); }
      .task-node-tooltip-wrap .node-tooltip { opacity: 0 !important; transition: opacity 0.15s ease; pointer-events: none; }
      .task-node-tooltip-wrap:hover .node-tooltip { opacity: 1 !important; }

      /* ── Terminal cursor blink ── */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
